<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NavAIgate Careers — Discover Your Ideal Career Path</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #0b0f14;
    --ink-soft: #1e2530;
    --slate: #3b4557;
    --mist: #8a94a6;
    --line: rgba(255,255,255,0.08);
    --gold: #c8a96e;
    --gold-light: #e2c99a;
    --cream: #f5f0e8;
    --white: #ffffff;
    --teal: #2dd4bf;
    --teal-dim: rgba(45,212,191,0.12);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--ink);
    color: var(--white);
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 48px;
    background: transparent;
    transition: background 0.5s, backdrop-filter 0.5s, padding 0.3s;
  }
  nav.scrolled {
    background: rgba(11,15,20,0.85);
    backdrop-filter: blur(20px);
    padding: 14px 48px;
    border-bottom: 1px solid var(--line);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--white);
    text-decoration: none;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--mist);
    text-decoration: none;
    transition: color 0.25s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-cta {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.25s, color 0.25s;
  }
  .nav-cta:hover { background: var(--gold); color: var(--ink); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 30%, rgba(200,169,110,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 80% 80%, rgba(45,212,191,0.04) 0%, transparent 50%);
  }
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 80px 80px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 80%);
  }
  .hero-eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s 0.2s forwards;
  }
  .hero-eyebrow::before, .hero-eyebrow::after {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--gold);
    opacity: 0.5;
  }
  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 8vw, 104px);
    font-weight: 300;
    line-height: 1.0;
    letter-spacing: -0.01em;
    max-width: 860px;
    color: var(--white);
    opacity: 0;
    transform: translateY(30px);
    animation: fadeUp 1s 0.4s forwards;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--gold-light);
  }
  .hero-sub {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--mist);
    max-width: 520px;
    margin-top: 28px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.9s 0.6s forwards;
  }
  .hero-cta-group {
    display: flex;
    gap: 16px;
    margin-top: 44px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.9s 0.8s forwards;
  }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 16px 36px;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-primary:hover::after { transform: translateX(100%); }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 36px rgba(200,169,110,0.3); }
  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.06em;
    padding: 16px 28px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--white);
    border-radius: 2px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }
  .hero-trust {
    margin-top: 64px;
    display: flex;
    align-items: center;
    gap: 32px;
    opacity: 0;
    animation: fadeUp 0.9s 1.1s forwards;
  }
  .trust-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .trust-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: var(--gold-light);
    line-height: 1;
  }
  .trust-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mist);
  }
  .trust-div { width: 1px; height: 44px; background: var(--line); }

  /* ── SECTION BASE ── */
  section { padding: 120px 24px; position: relative; }
  .container { max-width: 1120px; margin: 0 auto; }
  .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(40px, 5vw, 64px);
    font-weight: 300;
    line-height: 1.1;
    color: var(--white);
    margin-bottom: 20px;
  }
  .section-title em { font-style: italic; color: var(--gold-light); }
  .section-sub {
    font-size: 16px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--mist);
    max-width: 560px;
  }

  /* ── WHY SECTION ── */
  .why { background: var(--ink-soft); }
  .why-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 64px;
  }
  .why-card {
    padding: 48px 40px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--line);
    position: relative;
    overflow: hidden;
    transition: transform 0.3s, background 0.3s;
    will-change: transform;
  }
  .why-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    transform: scaleX(0);
    transition: transform 0.4s;
  }
  .why-card:hover::before { transform: scaleX(1); }
  .why-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.04); }
  .why-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    background: var(--teal-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    font-size: 24px;
  }
  .why-card h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 14px;
    color: var(--white);
  }
  .why-card p {
    font-size: 15px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--mist);
  }

  /* ── HOW IT WORKS ── */
  .how { background: var(--ink); }
  .how-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 80px; }
  .how-steps {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }
  .how-connector {
    position: absolute;
    top: 52px;
    left: calc(33.33% - 0px);
    width: 33.33%;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }
  .how-connector.c2 {
    left: calc(66.66% - 0px);
    background: linear-gradient(90deg, transparent, var(--gold));
    width: 0;
  }
  .step {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 32px;
    position: relative;
  }
  .step-num {
    width: 104px;
    height: 104px;
    border-radius: 50%;
    border: 1px solid rgba(200,169,110,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 32px;
    position: relative;
    background: rgba(200,169,110,0.04);
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px;
    font-weight: 300;
    color: var(--gold);
    transition: border-color 0.3s, background 0.3s;
  }
  .step:hover .step-num { border-color: var(--gold); background: rgba(200,169,110,0.1); }
  .step h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .step p {
    font-size: 14px;
    font-weight: 300;
    line-height: 1.7;
    color: var(--mist);
  }

  /* ── ABOUT ── */
  .about { background: var(--ink-soft); overflow: hidden; }
  .about-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .about-img-wrap {
    position: relative;
  }
  .about-img-frame {
    position: absolute;
    inset: -16px -16px auto auto;
    width: 70%;
    height: 70%;
    border: 1px solid var(--gold);
    border-radius: 2px;
    opacity: 0.3;
  }
  .about-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    border-radius: 2px;
    filter: grayscale(20%);
  }
  .about-badge {
    position: absolute;
    bottom: -20px;
    right: -20px;
    background: var(--gold);
    color: var(--ink);
    padding: 20px 24px;
    border-radius: 2px;
  }
  .about-badge strong {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    line-height: 1;
  }
  .about-badge span {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .about-content .section-sub { margin-bottom: 36px; }
  .about-check {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 44px;
  }
  .check-item {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 15px;
    color: var(--cream);
  }
  .check-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--teal-dim);
    border: 1px solid var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--teal);
    font-size: 11px;
    flex-shrink: 0;
  }

  /* ── STATS BAR ── */
  .stats {
    background: var(--gold);
    padding: 60px 24px;
  }
  .stats-inner {
    display: flex;
    justify-content: center;
    gap: 80px;
    align-items: center;
  }
  .stat-item { text-align: center; }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 300;
    line-height: 1;
    color: var(--ink);
  }
  .stat-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(11,15,20,0.65);
    margin-top: 6px;
  }
  .stat-div { width: 1px; height: 60px; background: rgba(11,15,20,0.2); }

  /* ── TESTIMONIALS ── */
  .testi { background: var(--ink); }
  .testi-header { text-align: center; margin-bottom: 64px; }
  .testi-header .section-sub { margin: 0 auto; }
  .testi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .testi-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s, border-color 0.3s, background 0.3s;
  }
  .testi-card:hover {
    transform: translateY(-4px);
    border-color: rgba(200,169,110,0.2);
    background: rgba(255,255,255,0.04);
  }
  .stars { color: var(--gold); font-size: 16px; letter-spacing: 2px; margin-bottom: 24px; }
  .testi-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    font-style: italic;
    line-height: 1.6;
    color: var(--cream);
    flex: 1;
    margin-bottom: 32px;
  }
  .testi-author { display: flex; align-items: center; gap: 14px; }
  .testi-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--slate);
    border: 2px solid rgba(200,169,110,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    overflow: hidden;
  }
  .testi-name { font-size: 15px; font-weight: 500; }
  .testi-role { font-size: 12px; color: var(--mist); margin-top: 2px; }

  /* ── CTA ── */
  .cta-section {
    background: var(--ink-soft);
    text-align: center;
    padding: 140px 24px;
    position: relative;
    overflow: hidden;
  }
  .cta-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(200,169,110,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .cta-section .section-title { max-width: 700px; margin: 0 auto 20px; }
  .cta-section .section-sub { margin: 0 auto 48px; }
  .cta-checks {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .cta-check {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--mist);
  }
  .cta-check .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

  /* ── FOOTER ── */
  footer {
    background: #060a0e;
    padding: 48px 24px;
    text-align: center;
    border-top: 1px solid var(--line);
  }
  footer .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--white);
    margin-bottom: 12px;
  }
  footer .logo span { color: var(--gold); }
  footer p {
    font-size: 13px;
    color: var(--mist);
  }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .reveal.visible { opacity: 1; transform: none; }
  .reveal-d1 { transition-delay: 0.1s; }
  .reveal-d2 { transition-delay: 0.2s; }
  .reveal-d3 { transition-delay: 0.3s; }
  .reveal-d4 { transition-delay: 0.4s; }

  /* ── PARALLAX FLOAT ── */
  .float-shape {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
  }
  .shape-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,169,110,0.06) 0%, transparent 70%);
    top: -100px; right: -150px;
  }
  .shape-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(45,212,191,0.05) 0%, transparent 70%);
    bottom: -80px; left: -100px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    to { opacity: 1; transform: none; }
  }

  /* ── SCROLL PROGRESS ── */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--teal));
    z-index: 200;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ── CURSOR ── */
  .cursor {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--gold);
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, opacity 0.2s;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(200,169,110,0.5);
    position: fixed;
    pointer-events: none;
    z-index: 9997;
    transform: translate(-50%, -50%);
    transition: transform 0.12s ease-out, width 0.2s, height 0.2s;
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(6,10,14,0.88);
    backdrop-filter: blur(12px);
  }
  .modal-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    background: #141920;
    border: 1px solid rgba(200,169,110,0.2);
    border-radius: 4px;
    padding: 56px 48px 48px;
    transform: translateY(28px) scale(0.97);
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,169,110,0.05);
  }
  .modal-overlay.open .modal-box {
    transform: translateY(0) scale(1);
  }
  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 36px; height: 36px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 50%;
    color: var(--mist);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    line-height: 1;
  }
  .modal-close:hover { border-color: var(--gold); color: var(--gold); }
  .modal-eyebrow {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-eyebrow::after { content: ''; flex: 1; height: 1px; background: rgba(200,169,110,0.25); }
  .modal-box h2 {
